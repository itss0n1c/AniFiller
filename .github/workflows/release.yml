name: Compile And Release

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref }}
    cancel-in-progress: true

on:
    pull_request:
        types:
            - closed
        branches:
            - main
        paths:
            - data/shows/**

permissions:
    contents: write

jobs:
    release:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.merge_commit_sha }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Compile
              run: bun compile

            - name: Set release vars
              id: vars
              env:
                  MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
              shell: bash
              run: |
                  echo "short_sha=${MERGE_SHA::10}" >> "$GITHUB_OUTPUT"
                  echo "shows=$(jq 'length' dist/anifiller.json)" >> "$GITHUB_OUTPUT"

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.vars.outputs.short_sha }}
                  name: ${{ steps.vars.outputs.short_sha }}
                  generate_release_notes: true
                  body: |
                      ${{ steps.vars.outputs.shows }} shows bundled.
                  files: |
                      dist/anifiller.min.json
                      dist/anifiller.json
